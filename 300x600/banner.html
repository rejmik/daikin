<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="ad.size" content="width=300,height=600">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Daikin – 300x600</title>
<!-- Adform DHTML library (required in <head>) -->
<script>
  document.write('<script src="' + (window.API_URL || 'https://s1.adform.net/banners/scripts/rmb/Adform.DHTML.js?bv=' + Math.random()) + '"><\/script>');
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,400;0,600;0,700;1,700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#0a1530}
  #stage{position:relative;width:300px;height:600px;overflow:hidden;cursor:pointer;
    --u:3px;            /* min(w,h)/100, set by JS */
    font-family:'Source Sans 3','Segoe UI',Arial,sans-serif;background:#0a1530}

  /* ---------- background heatmaps ---------- */
  .bg{position:absolute;inset:-4%;background-position:center;background-size:cover;
    animation:drift 19s ease-in-out infinite alternate;will-change:transform}
  #bgO{background-image:url(images/bg_orange.jpg);opacity:1;transition:opacity 1s ease}
  #bgB{background-image:url(images/bg_blue.jpg);opacity:0;transition:opacity 1s ease;animation-delay:-7s}
  @keyframes drift{0%{transform:scale(1.02) translate(0,0)}50%{transform:scale(1.09) translate(-2%,1%)}100%{transform:scale(1.04) translate(2%,-1%)}}
  #stage.frozen .bg{animation-play-state:paused}   /* freeze drift when animation stops (<=30s, Adform) */
  #scrim{position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(6,18,40,.34) 0%,rgba(6,18,40,0) 26%,rgba(6,18,40,0) 54%,rgba(6,18,40,.5) 100%)}

  /* ---------- logo ---------- */
  #logo{position:absolute;top:calc(var(--u)*5);left:calc(var(--u)*5);width:36%;max-width:120px;
    z-index:6;opacity:0;transform:translateY(-6px);transition:opacity .6s ease,transform .6s ease}

  /* ---------- headlines ---------- */
  #heads{position:absolute;left:calc(var(--u)*6);right:calc(var(--u)*6);top:14%;height:34%;z-index:5}
  .head{position:absolute;left:0;right:0;color:#fff;font-weight:600;line-height:1.06;
    font-size:40px;text-shadow:0 2px 14px rgba(0,30,60,.45);
    opacity:0;transform:translateY(16px);transition:opacity .55s ease,transform .55s ease}
  .head i{font-style:italic;font-weight:700}
  .head.s3{font-size:40px}
  .head.show{opacity:1;transform:translateY(0)}
  .head.hide{opacity:0;transform:translateY(-14px)}
  /* slide 1 – oversized, centred in the whole banner for shock/impact */
  #h1wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:0 6%;z-index:5}
  #h1{position:static;width:100%;text-align:center;font-size:52px;font-weight:700;line-height:1.04;letter-spacing:-.01em}
  #h1 i{font-weight:700}

  /* ---------- products ---------- */
  .prod{position:absolute;z-index:4;opacity:0;will-change:transform,opacity;
    filter:drop-shadow(0 calc(var(--u)*2) calc(var(--u)*3) rgba(0,20,45,.4))}
  /* single product (slide 2) – same centre as the carousel on slide 3 */
  #pSingle{top:64%;left:50%;width:90%;
    transform:translate(-26%,-50%) scale(.97);transition:opacity .6s ease,transform .6s ease}
  #pSingle.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
  #pSingle.out{opacity:0;transform:translate(-78%,-50%) scale(.97)}
  /* slide 3 carousel: central card visible, neighbours bleed off the edges */
  .cc{position:absolute;top:64%;left:50%;width:90%;
    transition:transform .7s cubic-bezier(.45,.05,.2,1),opacity .6s ease}
  .cc.pos-c{transform:translate(-50%,-50%) scale(1);opacity:1;z-index:4}
  .cc.pos-l{transform:translate(-142%,-50%) scale(.66);opacity:.5;z-index:2}
  .cc.pos-r{transform:translate(42%,-50%) scale(.66);opacity:.5;z-index:2}

  /* ---------- CTA ---------- */
  #cta{position:absolute;left:50%;bottom:calc(var(--u)*5);transform:translateX(-50%) translateY(16px) scale(.96);
    z-index:7;padding:calc(var(--u)*3.2) calc(var(--u)*7);border:none;border-radius:calc(var(--u)*20);
    background:#fff;color:#0097E0;font-family:inherit;font-weight:700;font-size:calc(var(--u)*4.8);
    letter-spacing:.01em;cursor:pointer;white-space:nowrap;
    box-shadow:0 calc(var(--u)*1.5) calc(var(--u)*5) rgba(0,30,60,.34);
    opacity:0;transition:opacity .5s ease,transform .45s ease,background .2s ease,color .2s ease}
  #cta.show{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
  #cta.beat{animation:ctaBeat 2.6s ease-in-out infinite}
  #cta:hover{background:#0097E0;color:#fff;transform:translateX(-50%) translateY(0) scale(1.06);animation-play-state:paused}
  @keyframes ctaBeat{
    0%,58%,100%{transform:translateX(-50%) scale(1)}
    66%{transform:translateX(-50%) scale(1.12)}
    74%{transform:translateX(-50%) scale(1)}
    82%{transform:translateX(-50%) scale(1.12)}
    90%{transform:translateX(-50%) scale(.98)}}
</style>
</head>
<body>
  <div id="stage">
    <div class="bg" id="bgO"></div>
    <div class="bg" id="bgB"></div>
    <div id="scrim"></div>

    <img id="logo" src="images/logo.png" alt="Daikin">

    <div id="h1wrap"><div class="head" id="h1"></div></div>
    <div id="heads">
      <div class="head" id="h2"></div>
      <div class="head s3" id="h3"></div>
    </div>

    <img class="prod" id="pSingle" src="images/prod_emura.png" alt="">
    <img class="prod cc" id="t1" src="images/prod_emura.png" alt="">
    <img class="prod cc" id="t2" src="images/prod_stylish.png" alt="">
    <img class="prod cc" id="t3" src="images/prod_perfera.png" alt="">

    <button id="cta" type="button">Vybrat klimatizaci</button>
  </div>

<script>
(function(){
  "use strict";

  function gv(name, fallback){
    try{ if(window.dhtml && typeof dhtml.getVar==='function') return dhtml.getVar(name, fallback); }catch(e){}
    return fallback;
  }
  function qp(name){ try{ return new URLSearchParams(location.search).get(name)||''; }catch(e){ return ''; } }

  /* ---------- CONFIG (overridable as Adform custom variables) ---------- */
  var CFG = {
    owmKey:     qp('key') || gv('owmApiKey', 'YOUR_OPENWEATHERMAP_API_KEY'),
    threshold:  parseFloat(qp('th') || gv('tempThreshold', '28')),
    clickTag:   gv('clickTAG', 'https://www.daikin.cz/'),
    forceMode:  gv('forceMode', '') || qp('mode'),
    debug:      qp('debug')==='1'
  };
  var DIAG = { city:'—', temp:null, source:'—', mode:'—' };

  /* ---------- copy per mode (same animation, different text) ---------- */
  var COPY = {
    hot: {
      h1: 'Je vám <i>horko?</i>',
      h2: 'Pořiďte si <i>klimatizaci</i>',
      h3: 'Tiché klimatizace Daikin <i>se zárukou 7 let</i>'
    },
    cold: {
      h1: 'Máte doma zatím <i>chládek?</i>',
      h2: 'Pojistěte si ho <i>klimatizací Daikin</i>',
      h3: 'Chladí i vytápí. <i>Levně a spolehlivě</i>'
    }
  };

  var stage=document.getElementById('stage'),
      bgB=document.getElementById('bgB'),
      logo=document.getElementById('logo'),
      h1=document.getElementById('h1'), h2=document.getElementById('h2'), h3=document.getElementById('h3'),
      pSingle=document.getElementById('pSingle'),
      t1=document.getElementById('t1'), t2=document.getElementById('t2'), t3=document.getElementById('t3'),
      cta=document.getElementById('cta');

  function setUnit(){
    var w=stage.offsetWidth||300, h=stage.offsetHeight||600;
    stage.style.setProperty('--u',(Math.min(w,h)/100)+'px');
  }

  /* ---------- timeline (identical for hot & cold) ---------- */
  var timers=[], carInt=0, ci=0, cards=[t1,t2,t3], curMode='hot';
  var LOOP_MS=14000, loopsDone=0,
      maxLoops=Math.max(1, parseInt(qp('loops')||gv('maxLoops','2'),10)||2);  /* must stop <=30s (Adform) */
  function at(ms,fn){timers.push(setTimeout(fn,ms));}
  function carLayout(){
    for(var i=0;i<3;i++){ var d=((i-ci)%3+3)%3;
      cards[i].classList.remove('pos-c','pos-l','pos-r');
      cards[i].classList.add(d===0?'pos-c':(d===1?'pos-r':'pos-l')); }
  }
  function startCarousel(){ ci=0; carLayout(); clearInterval(carInt);
    carInt=setInterval(function(){ ci=(ci+1)%3; carLayout(); },2000); }

  function resetVisuals(){
    [h1,h2,h3].forEach(function(e){ e.classList.remove('show','hide'); });
    pSingle.classList.remove('show','out');
    cards.forEach(function(c){ c.classList.remove('pos-c','pos-l','pos-r'); });
    cta.classList.remove('show','beat');
    bgB.style.opacity = (curMode==='cold') ? 1 : 0;   /* slide 1: HOT orange, COLD blue */
  }

  /* one full cycle (slide 1 -> 2 -> 3 carousel) */
  function playCycle(){
    timers.forEach(clearTimeout); timers=[]; clearInterval(carInt);
    resetVisuals();
    logo.style.opacity=1; logo.style.transform='translateY(0)';

    at(400,  function(){ h1.classList.add('show'); });                 /* slide 1 */
    at(3000, function(){ h1.classList.remove('show'); h1.classList.add('hide'); });

    at(3400, function(){ bgB.style.opacity=1; });                      /* slide 2 */
    at(3600, function(){ h2.classList.add('show'); pSingle.classList.add('show'); });
    at(4100, function(){ cta.classList.add('show'); });
    at(4700, function(){ cta.classList.add('beat'); });
    at(7000, function(){ h2.classList.remove('show'); h2.classList.add('hide');
                         pSingle.classList.remove('show'); pSingle.classList.add('out'); });

    at(7500, function(){ h3.classList.add('show'); });                 /* slide 3 carousel */
    at(7800, startCarousel);

    at(LOOP_MS, nextLoop);                                             /* loop / stop */
  }
  function nextLoop(){
    loopsDone++;
    if(loopsDone < maxLoops){ playCycle(); }                           /* replay from slide 1 */
    else { stopAll(); }                                                /* hold final frame (<=30s) */
  }
  function stopAll(){
    timers.forEach(clearTimeout); timers=[]; clearInterval(carInt);
    cta.classList.remove('beat');
    stage.classList.add('frozen');                                     /* freeze heatmap drift */
  }
  function startSequence(){ loopsDone=0; stage.classList.remove('frozen'); playCycle(); }

  function applyMode(name){
    curMode=name;
    var c=COPY[name]||COPY.hot;
    h1.innerHTML=c.h1; h2.innerHTML=c.h2; h3.innerHTML=c.h3;
    setUnit(); startSequence();
  }

  /* ---------- weather decision ---------- */
  var finished=false, qaMode=(CFG.forceMode==='hot'||CFG.forceMode==='cold')?CFG.forceMode:'auto';
  function finish(mode,source){
    if(finished) return; finished=true;
    DIAG.mode=mode; DIAG.source=source; applyMode(mode); showDebug();
  }
  function decideAndStart(){
    if(CFG.forceMode==='hot'||CFG.forceMode==='cold'){ finish(CFG.forceMode,'vynuceno (?mode)'); return; }
    if(!CFG.owmKey||CFG.owmKey==='YOUR_OPENWEATHERMAP_API_KEY'){ finish('hot','fallback: chybí OWM klíč'); return; }
    var guard=setTimeout(function(){ finish('hot','fallback: timeout'); },2500);
    getLocation(function(lat,lon){
      getTemp(lat,lon,function(temp){
        clearTimeout(guard); DIAG.temp=temp;
        if(temp==null){ finish('hot','fallback: OWM bez dat'); return; }
        finish(temp>=CFG.threshold?'hot':'cold','z API ('+temp.toFixed(1)+' °C, práh '+CFG.threshold+')');
      });
    });
  }
  function getLocation(cb){
    fetchJSON('https://get.geojs.io/v1/ip/geo.json',function(d){
      if(d&&d.latitude&&d.longitude){ DIAG.city=(d.city||'?')+(d.country?(', '+d.country):''); cb(parseFloat(d.latitude),parseFloat(d.longitude)); }
      else finish('hot','fallback: GeoJS bez dat');
    },function(){ finish('hot','fallback: GeoJS chyba'); });
  }
  function getTemp(lat,lon,cb){
    var url='https://api.openweathermap.org/data/2.5/weather?lat='+lat+'&lon='+lon+'&units=metric&appid='+encodeURIComponent(CFG.owmKey);
    fetchJSON(url,function(d){ cb(d&&d.main&&typeof d.main.temp==='number'?d.main.temp:null); },function(){ cb(null); });
  }
  function fetchJSON(url,ok,err){
    try{
      var x=new XMLHttpRequest(); x.open('GET',url,true); x.timeout=2200;
      x.onreadystatechange=function(){ if(x.readyState===4){
        if(x.status>=200&&x.status<300){ try{ok(JSON.parse(x.responseText));}catch(e){err&&err();} } else err&&err(); }};
      x.ontimeout=function(){err&&err();}; x.onerror=function(){err&&err();}; x.send();
    }catch(e){err&&err();}
  }

  /* ---------- debug overlay (local QA only) ---------- */
  function resetSlides(){
    bgB.style.opacity=0;
    [h1,h2,h3].forEach(function(e){ e.classList.remove('show','hide'); });
    pSingle.classList.remove('show','out');
    cards.forEach(function(c){ c.classList.remove('pos-c','pos-l','pos-r'); });
    cta.classList.remove('show','beat');
    timers.forEach(clearTimeout); timers=[]; clearInterval(carInt);
  }
  function setManual(mode){
    qaMode=mode; finished=false; resetSlides();
    if(mode==='auto'){ decideAndStart(); } else { finish(mode,'ručně: '+mode.toUpperCase()); }
    paintSwitcher();
  }
  function paintSwitcher(){
    var sw=document.getElementById('sw'); if(!sw) return;
    [].forEach.call(sw.children,function(b){ var on=b.dataset.m===qaMode;
      b.style.background=on?'#0097E0':'#1b2127'; b.style.color=on?'#fff':'#ccc'; });
  }
  function ensureQA(){
    var box=document.getElementById('qa'); if(box) return;
    box=document.createElement('div'); box.id='qa';
    box.style.cssText='position:absolute;left:0;z-index:99;font:11px/1.5 monospace;'+
      'width:'+stage.offsetWidth+'px;top:'+(stage.offsetTop+stage.offsetHeight+4)+'px';
    var dbg=document.createElement('div'); dbg.id='dbg';
    dbg.style.cssText='background:#101418;color:#0f0;padding:6px 8px;white-space:pre-wrap';
    var sw=document.createElement('div'); sw.id='sw';
    sw.style.cssText='display:flex;gap:4px;margin-top:4px';
    [['hot','HOT'],['cold','COLD'],['auto','AUTO']].forEach(function(p){
      var b=document.createElement('button'); b.textContent=p[1]; b.setAttribute('data-m',p[0]); b.dataset.m=p[0];
      b.style.cssText='flex:1;padding:7px 0;border:1px solid #333;background:#1b2127;color:#ccc;cursor:pointer;font:700 11px monospace;border-radius:3px';
      b.onclick=function(){ setManual(p[0]); };
      sw.appendChild(b);
    });
    box.appendChild(dbg); box.appendChild(sw); document.body.appendChild(box);
  }
  function showDebug(){
    if(!CFG.debug) return;
    ensureQA();
    document.getElementById('dbg').textContent='DEBUG (jen lokálně)\nLokace: '+DIAG.city+
      '\nTeplota: '+(DIAG.temp==null?'—':DIAG.temp+' °C')+
      '\nRozhodnutí: '+DIAG.mode.toUpperCase()+'\nDůvod: '+DIAG.source;
    paintSwitcher();
  }

  /* ---------- interactions ---------- */
  stage.addEventListener('click',function(){ try{ window.open(CFG.clickTag,'_blank'); }catch(e){} });
  window.addEventListener('resize',setUnit);

  function start(){ setUnit(); decideAndStart(); }
  if(window.dhtml){ start(); } else { window.addEventListener('load',start); setTimeout(function(){ if(!finished) start(); },400); }
})();
</script>
</body>
</html>
